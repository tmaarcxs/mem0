name: Sync upstream

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    name: Merge mem0ai/mem0 main
    runs-on: ubuntu-latest
    if: github.repository != 'mem0ai/mem0'

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch sync refs
        run: |
          git remote add upstream https://github.com/mem0ai/mem0.git || git remote set-url upstream https://github.com/mem0ai/mem0.git
          git fetch --prune origin main:refs/remotes/origin/main
          git fetch --prune upstream main:refs/remotes/upstream/main
          git checkout -B main origin/main

      - name: Merge upstream
        id: merge
        shell: bash
        run: |
          set -u
          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Fork already contains upstream/main."
            exit 0
          fi

          if git merge --no-edit -s ort -X diff-algorithm=histogram -X renormalize upstream/main; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git diff --name-only --diff-filter=U > upstream-conflicts.txt
          {
            echo "conflicts<<EOF"
            cat upstream-conflicts.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          git merge --abort || true
          exit 2

      - name: Push clean merge
        if: steps.merge.outputs.changed == 'true'
        run: git push origin HEAD:main

      - name: Report sync conflict
        if: failure() && steps.merge.outputs.conflicts != ''
        env:
          CONFLICTS: ${{ steps.merge.outputs.conflicts }}
          RUN_ID: ${{ github.run_id }}
          REPOSITORY: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
        shell: bash
        run: |
          set -euo pipefail
          run_url="${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}"
          {
            echo "## Upstream sync conflict"
            echo
            echo "Automatic upstream sync could not merge \`mem0ai/mem0:main\` into this fork's \`main\` branch cleanly."
            echo
            echo "This workflow intentionally avoids \`ours\` or \`theirs\` conflict resolution because fork customizations must be preserved."
            echo
            echo "### Conflicting files"
            echo
            echo '```text'
            printf '%s\n' "$CONFLICTS"
            echo '```'
            echo
            echo "### Suggested local resolution"
            echo
            echo '```bash'
            echo "git fetch upstream main"
            echo "git merge -s ort -X diff-algorithm=histogram -X renormalize upstream/main"
            echo "# resolve conflicts, then commit and push main"
            echo '```'
            echo
            printf 'Workflow run: %s\n' "$run_url"
          } >> "$GITHUB_STEP_SUMMARY"
