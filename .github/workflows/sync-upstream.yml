name: Sync upstream

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    name: Merge mem0ai/mem0 main
    runs-on: ubuntu-latest
    if: github.repository != 'mem0ai/mem0'

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/mem0ai/mem0.git || git remote set-url upstream https://github.com/mem0ai/mem0.git
          git fetch upstream main

      - name: Merge upstream
        id: merge
        shell: bash
        run: |
          set -u
          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Fork already contains upstream/main."
            exit 0
          fi

          if git merge --no-edit upstream/main; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git diff --name-only --diff-filter=U > upstream-conflicts.txt
          {
            echo "conflicts<<EOF"
            cat upstream-conflicts.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          git merge --abort || true
          exit 2

      - name: Push clean merge
        if: steps.merge.outputs.changed == 'true'
        run: git push origin HEAD:main

      - name: Report sync conflict
        if: failure() && steps.merge.outputs.conflicts != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONFLICTS: ${{ steps.merge.outputs.conflicts }}
          RUN_ID: ${{ github.run_id }}
          REPOSITORY: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
        shell: bash
        run: |
          set -euo pipefail
          title="Upstream sync conflict"
          run_url="${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}"
          body_file="$(mktemp)"
          {
            echo "Automatic upstream sync could not merge mem0ai/mem0:main cleanly."
            echo
            echo "Conflicting files:"
            echo '```'
            printf '%s\n' "$CONFLICTS"
            echo '```'
            echo
            echo "Resolve by merging upstream/main locally, keeping the self-hosted plugin and custom dashboard patches, then push main."
            echo
            printf 'Workflow run: %s\n' "$run_url"
          } > "$body_file"

          existing="$(gh issue list --state open --search "${title} in:title" --json number --jq '.[0].number // empty')"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body-file "$body_file"
          else
            gh issue create --title "$title" --body-file "$body_file"
          fi
